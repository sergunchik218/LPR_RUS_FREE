<svg viewBox="0 0 750 1150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-down" markerWidth="7" markerHeight="6" refX="3.5" refY="5" orient="auto">
      <polygon points="0 0, 7 0, 3.5 6" fill="#3b4f6b" />
    </marker>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#10192e" stroke-width="0.6"/>
    </pattern>

    <linearGradient id="grad-input" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(251, 191, 36, 0.12)" /><stop offset="100%" stop-color="rgba(251, 191, 36, 0.02)" />
    </linearGradient>
    <linearGradient id="grad-cnn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(34, 211, 238, 0.12)" /><stop offset="100%" stop-color="rgba(34, 211, 238, 0.02)" />
    </linearGradient>
    <linearGradient id="grad-rnn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.12)" /><stop offset="100%" stop-color="rgba(167, 139, 250, 0.02)" />
    </linearGradient>
    <linearGradient id="grad-out" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(251, 113, 133, 0.12)" /><stop offset="100%" stop-color="rgba(251, 113, 133, 0.02)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#070c1e" rx="10" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="10" />

  <!-- Column labels -->
  <rect x="55" y="8" width="120" height="18" rx="4" fill="#22d3ee" opacity="0.15" />
  <text x="115" y="21" fill="#22d3ee" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">CNN BACKBONE</text>

  <rect x="440" y="8" width="120" height="18" rx="4" fill="#a78bfa" opacity="0.15" />
  <text x="500" y="21" fill="#a78bfa" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">SEQUENCE MODEL</text>

  <rect x="600" y="8" width="120" height="18" rx="4" fill="#fb7185" opacity="0.15" />
  <text x="660" y="21" fill="#fb7185" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">DECODER</text>

  <!-- BLOCK 0: INPUT -->
  <rect x="185" y="40" width="380" height="60" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" />
  <rect x="185" y="40" width="380" height="60" rx="8" fill="url(#grad-input)" />
  <rect x="205" y="53" width="70" height="34" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.75"/>
  <rect x="210" y="58" width="60" height="24" rx="1" fill="#020617" stroke="#475569" stroke-width="0.5"/>
  <text x="240" y="75" fill="#fbbf24" font-size="8" font-weight="900" text-anchor="middle" font-family="monospace">A080AA</text>
  <text x="300" y="65" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="monospace">КРОП НОМЕРА</text>
  <text x="300" y="80" fill="#64748b" font-size="8.5" font-family="monospace">H × W пикселей, grayscale (1 канал)</text>
  <text x="300" y="93" fill="#fbbf24" font-size="7.5" font-weight="bold" font-family="monospace">Входной тензор: [1, H, W]</text>

  <line x1="375" y1="100" x2="375" y2="130" stroke="#3b4f6b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 1: Conv1 -->
  <rect x="185" y="136" width="380" height="72" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" />
  <rect x="185" y="136" width="380" height="72" rx="8" fill="url(#grad-cnn)" />
  <rect x="205" y="150" width="22" height="14" rx="2" fill="#22d3ee" opacity="0.2" />
  <text x="233" y="161" fill="#22d3ee" font-size="10.5" font-weight="bold" font-family="monospace">Conv2d</text>
  <text x="310" y="161" fill="#e2e8f0" font-size="9" font-family="monospace">+ BatchNorm + ReLU + MaxPool</text>
  <text x="233" y="179" fill="#64748b" font-size="8" font-family="monospace">Ядро 3×3, stride=1, padding=1</text>
  <text x="233" y="194" fill="#22d3ee" font-size="8" font-weight="bold" font-family="monospace">Выход: [84, H/2, W/2]</text>

  <line x1="375" y1="208" x2="375" y2="238" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 2: Conv2 -->
  <rect x="185" y="244" width="380" height="72" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" />
  <rect x="185" y="244" width="380" height="72" rx="8" fill="url(#grad-cnn)" />
  <rect x="205" y="258" width="22" height="14" rx="2" fill="#22d3ee" opacity="0.2" />
  <text x="233" y="269" fill="#22d3ee" font-size="10.5" font-weight="bold" font-family="monospace">Conv2d</text>
  <text x="310" y="269" fill="#e2e8f0" font-size="9" font-family="monospace">+ BatchNorm + ReLU + MaxPool</text>
  <text x="233" y="287" fill="#64748b" font-size="8" font-family="monospace">Ядро 3×3, stride=1, padding=1</text>
  <text x="233" y="302" fill="#22d3ee" font-size="8" font-weight="bold" font-family="monospace">Выход: [128, H/4, W/4]</text>

  <line x1="375" y1="316" x2="375" y2="346" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 3: Conv3 -->
  <rect x="185" y="352" width="380" height="72" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" />
  <rect x="185" y="352" width="380" height="72" rx="8" fill="url(#grad-cnn)" />
  <rect x="205" y="366" width="22" height="14" rx="2" fill="#22d3ee" opacity="0.2" />
  <text x="233" y="377" fill="#22d3ee" font-size="10.5" font-weight="bold" font-family="monospace">Conv2d</text>
  <text x="310" y="377" fill="#e2e8f0" font-size="9" font-family="monospace">+ BatchNorm + ReLU<tspan fill="#64748b"> (без пулинга)</tspan></text>
  <text x="233" y="395" fill="#64748b" font-size="8" font-family="monospace">Ядро 3×3, stride=1, padding=1</text>
  <text x="233" y="410" fill="#22d3ee" font-size="8" font-weight="bold" font-family="monospace">Выход: [256, H/4, W/4]</text>

  <line x1="375" y1="424" x2="375" y2="454" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 4: Conv4 -->
  <rect x="185" y="460" width="380" height="72" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" />
  <rect x="185" y="460" width="380" height="72" rx="8" fill="url(#grad-cnn)" />
  <rect x="205" y="474" width="22" height="14" rx="2" fill="#22d3ee" opacity="0.2" />
  <text x="233" y="485" fill="#22d3ee" font-size="10.5" font-weight="bold" font-family="monospace">Conv2d</text>
  <text x="310" y="485" fill="#e2e8f0" font-size="9" font-family="monospace">+ BatchNorm + ReLU<tspan fill="#64748b"> (без пулинга)</tspan></text>
  <text x="233" y="503" fill="#64748b" font-size="8" font-family="monospace">Ядро 3×3, stride=1, padding=1</text>
  <text x="233" y="518" fill="#22d3ee" font-size="8" font-weight="bold" font-family="monospace">Выход: [256, H/4, W/4]</text>

  <line x1="375" y1="532" x2="375" y2="562" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 5: AdaptiveAvgPool -->
  <rect x="185" y="568" width="380" height="62" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" />
  <rect x="185" y="568" width="380" height="62" rx="8" fill="url(#grad-cnn)" />
  <text x="375" y="591" fill="#22d3ee" font-size="11" font-weight="bold" text-anchor="middle" font-family="monospace">AdaptiveAvgPool2d</text>
  <text x="375" y="610" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace">Схлопывание высоты H→1: карта признаков сжимается по вертикали</text>
  <text x="375" y="624" fill="#22d3ee" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">Выход: [256, 1, W/4]  →  Reshape: [W/4, 256]</text>

  <line x1="375" y1="630" x2="375" y2="665" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8,3" marker-end="url(#arrow-down)" />
  <text x="395" y="650" fill="#a78bfa" font-size="7.5" font-weight="bold" font-family="monospace">reshaped</text>

  <!-- BLOCK 6: 2x BiLSTM -->
  <rect x="185" y="672" width="380" height="80" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" />
  <rect x="185" y="672" width="380" height="80" rx="8" fill="url(#grad-rnn)" />
  <text x="375" y="698" fill="#a78bfa" font-size="11" font-weight="bold" text-anchor="middle" font-family="monospace">2× BiLSTM (hidden=256)</text>

  <rect x="220" y="710" width="54" height="32" rx="3" fill="#1e1b4b" stroke="#a78bfa" stroke-width="0.75" />
  <text x="247" y="730" fill="#a78bfa" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">LSTM₁</text>
  <text x="247" y="740" fill="#64748b" font-size="6" text-anchor="middle" font-family="monospace">fwd</text>

  <rect x="296" y="710" width="54" height="32" rx="3" fill="#1e1b4b" stroke="#a78bfa" stroke-width="0.75" />
  <text x="323" y="730" fill="#a78bfa" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">LSTM₂</text>
  <text x="323" y="740" fill="#64748b" font-size="6" text-anchor="middle" font-family="monospace">bwd</text>
  <line x1="274" y1="726" x2="294" y2="726" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="284" y="720" fill="#64748b" font-size="5.5" text-anchor="middle" font-family="monospace">concat</text>

  <rect x="372" y="710" width="54" height="32" rx="3" fill="#1e1b4b" stroke="#a78bfa" stroke-width="0.75" />
  <text x="399" y="730" fill="#a78bfa" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">LSTM₁</text>
  <text x="399" y="740" fill="#64748b" font-size="6" text-anchor="middle" font-family="monospace">fwd</text>

  <rect x="448" y="710" width="54" height="32" rx="3" fill="#1e1b4b" stroke="#a78bfa" stroke-width="0.75" />
  <text x="475" y="730" fill="#a78bfa" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">LSTM₂</text>
  <text x="475" y="740" fill="#64748b" font-size="6" text-anchor="middle" font-family="monospace">bwd</text>
  <line x1="426" y1="726" x2="446" y2="726" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="375" y="749" fill="#64748b" font-size="7" text-anchor="middle" font-family="monospace">Bidirectional encoder: seq_len=W/4, feature_dim=512 (256×2)</text>

  <line x1="375" y1="752" x2="375" y2="787" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 7: Linear -->
  <rect x="185" y="794" width="380" height="62" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5" />
  <rect x="185" y="794" width="380" height="62" rx="8" fill="url(#grad-out)" />
  <text x="375" y="818" fill="#fb7185" font-size="11" font-weight="bold" text-anchor="middle" font-family="monospace">Linear (512 → 23)</text>
  <text x="375" y="836" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace">Проекция скрытого состояния BiLSTM на логиты символов</text>
  <text x="375" y="851" fill="#fb7185" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">23 класса: 22 символа алфавита + blank (CTC)</text>

  <line x1="375" y1="856" x2="375" y2="891" stroke="#fb7185" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 8: CTC Decoder -->
  <rect x="185" y="898" width="380" height="62" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5" />
  <rect x="185" y="898" width="380" height="62" rx="8" fill="url(#grad-out)" />
  <text x="375" y="922" fill="#fb7185" font-size="11" font-weight="bold" text-anchor="middle" font-family="monospace">CTC Decoder (greedy)</text>
  <text x="375" y="940" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace">Схлопывание повторяющихся символов, удаление blank-токенов</text>
  <text x="375" y="954" fill="#fb7185" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">Лучший путь → итоговая строка</text>

  <line x1="375" y1="960" x2="375" y2="995" stroke="#10b981" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-down)" />

  <!-- BLOCK 9: RESULT -->
  <rect x="200" y="1002" width="350" height="70" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2" />
  <rect x="200" y="1002" width="350" height="70" rx="10" fill="url(#grad-input)" />
  <text x="375" y="1028" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="monospace">РЕЗУЛЬТАТ</text>
  <rect x="260" y="1038" width="230" height="24" rx="3" fill="#e2e8f0" stroke="#000" stroke-width="1.25"/>
  <text x="375" y="1056" fill="#000" font-size="14" font-weight="900" text-anchor="middle" font-family="monospace">A080AA163</text>
  <text x="375" y="1068" fill="#10b981" font-size="7" text-anchor="middle" font-family="monospace">conf: 0.987 · порог 0.75</text>
</svg>
