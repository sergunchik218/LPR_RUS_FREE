<svg viewBox="0 0 1250 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#3b4f6b" />
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#10b981" />
    </marker>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#3b82f6" />
    </marker>
    <marker id="arrow-violet" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#a78bfa" />
    </marker>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#10192e" stroke-width="0.75"/>
    </pattern>

    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 0.7)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 0.7)" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.08)" />
      <stop offset="100%" stop-color="rgba(16, 185, 129, 0)" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0.08)" />
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0)" />
    </linearGradient>
    <linearGradient id="grad-violet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.08)" />
      <stop offset="100%" stop-color="rgba(167, 139, 250, 0)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#070c1e" rx="10" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="10" />

  <!-- Flow connectors -->
  <path d="M 170 180 L 245 180" fill="none" stroke="#3b4f6b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <text x="207" y="168" fill="#475569" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">ПОТОК</text>

  <path d="M 525 180 L 585 180" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="8,4"/>
  <text x="555" y="155" fill="#10b981" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">КРОП АВТО</text>
  <text x="555" y="170" fill="#475569" font-size="7" text-anchor="middle" font-family="monospace">Bounding Box</text>

  <path d="M 865 180 L 925 180" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="8,4"/>
  <text x="895" y="155" fill="#3b82f6" font-size="8" font-weight="bold" text-anchor="middle" font-family="monospace">КРОП НОМЕРА</text>
  <text x="895" y="170" fill="#475569" font-size="7" text-anchor="middle" font-family="monospace">+ отступ 15%</text>

  <path d="M 1195 180 L 1230 180" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)" stroke-dasharray="8,4"/>

  <!-- INPUT -->
  <rect x="20" y="70" width="150" height="220" rx="8" fill="#0f172a" stroke="#3b4f6b" stroke-width="1.5" />
  <rect x="20" y="70" width="150" height="220" rx="8" fill="url(#blueGradient)" />
  
  <rect x="40" y="95" width="110" height="80" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <path d="M 65 140 L 85 140 L 89 146 L 101 146 L 105 140 L 115 140 M 55 135 L 125 135 M 90 112 A 12 12 0 0 1 90 128" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="95" cy="120" r="14" fill="none" stroke="#3b82f6" stroke-width="1.5" />
  <circle cx="95" cy="120" r="6" fill="#3b82f6" />
  <circle cx="112" cy="107" r="2.5" fill="#ef4444" />
  
  <text x="95" y="200" fill="#e2e8f0" font-size="10" font-weight="bold" text-anchor="middle" font-family="monospace">ВХОДНОЙ КАДР</text>
  <text x="95" y="218" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace">Фото / Видео / RTSP</text>
  <text x="95" y="232" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace">JPEG · H.264 · RTP</text>
  <text x="95" y="255" fill="#38bdf8" font-size="7.5" font-weight="bold" text-anchor="middle" font-family="monospace">БЕЗ ОБРАБОТКИ</text>

  <!-- STEP 1: DETECT VEHICLE -->
  <rect x="245" y="45" width="280" height="280" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.5" />
  <rect x="245" y="45" width="280" height="280" rx="10" fill="url(#grad-green)" />
  
  <rect x="260" y="32" width="70" height="18" rx="4" fill="#10b981" />
  <text x="295" y="44" fill="#020617" font-size="8.5" font-weight="bold" text-anchor="middle" font-family="monospace">ШАГ 1</text>
  
  <text x="265" y="75" fill="#10b981" font-size="10.5" font-weight="bold" font-family="monospace">ДЕТЕКЦИЯ АВТОМОБИЛЯ</text>
  
  <rect x="265" y="85" width="240" height="38" rx="4" fill="#020617" stroke="#1c2d3d" stroke-width="1" />
  <text x="275" y="99" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="monospace">YOLO11n (Ultralytics)</text>
  <text x="275" y="113" fill="#64748b" font-size="8" font-family="monospace">2.6M параметров | 5.5 MB</text>
  
  <g transform="translate(265, 132)">
    <rect width="240" height="110" rx="4" fill="#040814" stroke="#1c2d3d" stroke-width="1" />
    <line x1="10" y1="100" x2="230" y2="100" stroke="#1e293b" stroke-width="1" stroke-dasharray="2,2" />
    <path d="M 45 85 L 45 68 Q 45 58 60 58 L 145 58 Q 160 58 165 71 L 170 85 Z" fill="none" stroke="#475569" stroke-width="1.25" />
    <rect x="55" y="85" width="105" height="15" rx="2" fill="none" stroke="#475569" stroke-width="1.25" />
    <circle cx="68" cy="100" r="7" fill="none" stroke="#475569" stroke-width="1.25" />
    <circle cx="143" cy="100" r="7" fill="none" stroke="#475569" stroke-width="1.25" />
    <rect x="35" y="42" width="150" height="65" rx="2" fill="none" stroke="#10b981" stroke-width="1.75" stroke-dasharray="32,2,32,2" />
    <rect x="35" y="30" width="55" height="12" rx="1" fill="#10b981" />
    <text x="62.5" y="39" fill="#020617" font-size="7" font-weight="bold" text-anchor="middle" font-family="monospace">car 0.96</text>
  </g>
  
  <text x="265" y="278" fill="#94a3b8" font-size="8" font-family="monospace">Классы: <tspan fill="#e2e8f0" font-weight="bold">car</tspan>, <tspan fill="#e2e8f0" font-weight="bold">bus</tspan>, <tspan fill="#e2e8f0" font-weight="bold">truck</tspan></text>
  <text x="265" y="294" fill="#94a3b8" font-size="8" font-family="monospace">Предобучена на COCO · Порог: <tspan fill="#fbbf24" font-weight="bold">0.35</tspan></text>

  <!-- STEP 2: FIND PLATE -->
  <rect x="585" y="45" width="280" height="280" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" />
  <rect x="585" y="45" width="280" height="280" rx="10" fill="url(#grad-blue)" />
  
  <rect x="600" y="32" width="70" height="18" rx="4" fill="#3b82f6" />
  <text x="635" y="44" fill="#e2e8f0" font-size="8.5" font-weight="bold" text-anchor="middle" font-family="monospace">ШАГ 2</text>
  
  <text x="605" y="75" fill="#3b82f6" font-size="10.5" font-weight="bold" font-family="monospace">ПОИСК НОМЕРНОГО ЗНАКА</text>
  
  <rect x="605" y="85" width="240" height="38" rx="4" fill="#020617" stroke="#1c2d3d" stroke-width="1" />
  <text x="615" y="99" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="monospace">plate_detect_rus.pt</text>
  <text x="615" y="113" fill="#64748b" font-size="8" font-family="monospace">YOLO11n свой · 2.6M / 5.5 MB</text>
  
  <g transform="translate(605, 132)">
    <rect width="240" height="110" rx="4" fill="#040814" stroke="#1c2d3d" stroke-width="1" />
    <rect x="15" y="25" width="210" height="70" rx="3" fill="#111827" stroke="#1e293b" />
    <rect x="40" y="48" width="160" height="32" fill="#030712" rx="1" stroke="#334155" />
    <rect x="58" y="56" width="124" height="17" fill="#e2e8f0" stroke="#000" stroke-width="1.25"/>
    <text x="120" y="69" fill="#000" font-size="10" font-weight="900" text-anchor="middle" font-family="monospace">A080AA163</text>
    <rect x="56" y="54" width="128" height="21" rx="1" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="43" y="42" width="154" height="45" rx="2" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="16,2,16,2" />
    <rect x="43" y="30" width="68" height="12" rx="1" fill="#3b82f6" />
    <text x="77" y="39" fill="#e2e8f0" font-size="6.5" font-weight="bold" text-anchor="middle" font-family="monospace">numberplate 0.99</text>
  </g>
  
  <text x="605" y="278" fill="#94a3b8" font-size="8" font-family="monospace">Класс: <tspan fill="#e2e8f0" font-weight="bold">numberplate</tspan></text>
  <text x="605" y="294" fill="#38bdf8" font-size="8" font-weight="bold" font-family="monospace">1 490 РФ-фото · mAP50 0.98 · Порог 0.35</text>

  <!-- STEP 3: OCR -->
  <rect x="925" y="45" width="280" height="280" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" />
  <rect x="925" y="45" width="280" height="280" rx="10" fill="url(#grad-violet)" />
  
  <rect x="940" y="32" width="70" height="18" rx="4" fill="#a78bfa" />
  <text x="975" y="44" fill="#020617" font-size="8.5" font-weight="bold" text-anchor="middle" font-family="monospace">ШАГ 3</text>
  
  <text x="945" y="75" fill="#a78bfa" font-size="10.5" font-weight="bold" font-family="monospace">РАСПОЗНАВАНИЕ ТЕКСТА (OCR)</text>
  
  <rect x="945" y="85" width="240" height="38" rx="4" fill="#020617" stroke="#1c2d3d" stroke-width="1" />
  <text x="955" y="99" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="monospace">CRNN (CNN + BiLSTM + CTC)</text>
  <text x="955" y="113" fill="#64748b" font-size="8" font-family="monospace">1.75M параметров | 21 MB</text>
  
  <g transform="translate(945, 132)">
    <rect width="240" height="110" rx="4" fill="#040814" stroke="#1c2d3d" stroke-width="1" />
    <rect x="15" y="18" width="210" height="44" rx="3" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="24" y="44" fill="#000" font-size="18" font-weight="900" font-family="monospace">A080AA</text>
    <line x1="165" y1="18" x2="165" y2="62" stroke="#000" stroke-width="1.25" />
    <text x="195" y="37" fill="#000" font-size="13" font-weight="950" text-anchor="middle" font-family="monospace">163</text>
    <text x="182" y="51" fill="#000" font-size="6" font-weight="bold" font-family="monospace">RUS</text>
    <rect x="198" y="45" width="14" height="8" fill="none" stroke="#bbb" stroke-width="0.5" />
    <rect x="198" y="45" width="14" height="2.6" fill="#fff" />
    <rect x="198" y="47.6" width="14" height="2.6" fill="#00f" />
    <rect x="198" y="50.2" width="14" height="2.8" fill="#f00" />
    
    <line x1="88" y1="14" x2="88" y2="66" stroke="#a78bfa" stroke-width="2" />
    <line x1="120" y1="14" x2="120" y2="66" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M 12 66 L 228 66" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" />

    <circle cx="55" cy="92" r="3.5" fill="#10b981" />
    <line x1="58.5" y1="92" x2="100" y2="92" stroke="#1e293b" />
    <circle cx="105" cy="92" r="3.5" fill="#10b981" />
    <line x1="108.5" y1="92" x2="150" y2="92" stroke="#1e293b" />
    <circle cx="155" cy="92" r="3.5" fill="#10b981" />
    <text x="185" y="96" fill="#10b981" font-size="8.5" font-weight="bold" font-family="monospace">conf: 0.987</text>
  </g>
  
  <text x="945" y="278" fill="#a78bfa" font-size="8" font-weight="bold" font-family="monospace">Алфавит: АВЕКМНОРСТУХ + 0-9</text>
  <text x="945" y="294" fill="#22d3ee" font-size="8" font-family="monospace">Точность: <tspan font-weight="bold">99.4%</tspan> · Порог OCR: <tspan fill="#fbbf24" font-weight="bold">0.75</tspan></text>
</svg>
